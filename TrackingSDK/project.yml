name: TrackingSDK
options:
  bundleIdPrefix: com.dar.trackingsdk
  deploymentTarget:
    iOS: "15.0"

configs:
  Dev: debug
  Staging: release
  Production: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: true
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    OTHER_LDFLAGS: $(inherited)
    DEVELOPMENT_LANGUAGE: vi
  configs:
    Dev:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV
      ENABLE_TESTABILITY: true
    Staging:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: STAGING
      ENABLE_TESTABILITY: true
    Production:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: PRODUCTION
      ENABLE_TESTABILITY: true

targets:
  TrackingSDK:
    type: framework
    product: framework
    platform: iOS
    supportedDestinations: [iOS]
    deploymentTarget: "15.0"
    sources:
      - path: Sources/TrackingSDK
        excludes:
          - Supporting Files/Info.plist
    dependencies:
      - sdk: CoreTelephony.framework
      - package: AppsFlyerFramework
        product: AppsFlyerLib
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseAnalyticsCore
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseCore
      - package: AdjustSDK
        product: AdjustSdk
      - package: TikTokBusinessSDK
        product: TikTokBusinessSDK
    settings:
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      SKIP_INSTALL: NO
      ENABLE_USER_SCRIPT_SANDBOXING: YES
      INFOPLIST_FILE: Sources/TrackingSDK/Supporting Files/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.dar.trackingsdk

  TrackingSDKTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/TrackingSDKTests
    dependencies:
      - target: TrackingSDK
    settings:
      INFOPLIST_FILE: Sources/TrackingSDKTests/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.dar.trackingsdk.tests

schemes:
  TrackingSDK-Dev:
    archive:
      config: Dev
    build:
      targets:
        TrackingSDK: all
        TrackingSDKTests: all
    test:
      targets:
        TrackingSDKTests:
          parallelizable: false
          randomExecutionOrder: false
    run:
      config: Dev

  TrackingSDK-Staging:
    archive:
      config: Staging
    build:
      targets:
        TrackingSDK: all
        TrackingSDKTests: all
    test:
      targets:
        TrackingSDKTests:
          parallelizable: false
          randomExecutionOrder: false
    run:
      config: Staging

  TrackingSDK-Production:
    archive:
      config: Production
    build:
      targets:
        TrackingSDK: all
        TrackingSDKTests: all
    test:
      targets:
        TrackingSDKTests:
          parallelizable: false
          randomExecutionOrder: false
    run:
      config: Production

packages:
  AppsFlyerFramework:
    url: https://github.com/AppsFlyerSDK/AppsFlyerFramework.git
    from: 6.15.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.5.0
  AdjustSDK:
    url: https://github.com/adjust/ios_sdk.git
    from: 5.5.1
  TikTokBusinessSDK:
    url: https://github.com/tiktok/tiktok-business-ios-sdk.git
    from: 1.6.1
