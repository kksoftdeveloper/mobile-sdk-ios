name: PaymentSDK
options:
  bundleIdPrefix: com.dar.paymentsdk
  deploymentTarget:
    iOS: "15.0"

configs:
  Dev: debug
  Staging: release
  Production: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: true
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 0.9.0-alpha
    OTHER_LDFLAGS: $(inherited)
    DEVELOPMENT_LANGUAGE: vi
  configs:
    Dev:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV
      ENABLE_TESTABILITY: true
    Staging:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: STAGING
      ENABLE_TESTABILITY: true
    Production:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: PRODUCTION
      ENABLE_TESTABILITY: true

targets:
  PaymentSDK:
    type: framework
    product: framework
    platform: iOS
    supportedDestinations: [iOS]
    deploymentTarget: "15.0"
    sources:
      - path: Sources/PaymentSDK
        excludes:
          - Supporting Files/Info.plist
      - path: Sources/PaymentSDKUI
      - path: Sources/Assets.xcassets
      - path: Sources/Localization.xcstrings
      - path: Sources/Fonts/FS-ClanPro-NarrowUltra.ttf 
      - path: Sources/Fonts/Poppins-Bold.ttf
      - path: Sources/Fonts/Poppins-Light.ttf
      - path: Sources/Fonts/Poppins-LightItalic.ttf
      - path: Sources/Fonts/Poppins-Medium.ttf
      - path: Sources/Fonts/Poppins-SemiBold.ttf
      - path: Sources/Fonts/Poppins-Thin.ttf
    resources:
      - path: "Sources/Assets.xcassets"
      - path: "Localization.xcstrings"
      - path: "Sources/Fonts/**" 
    dependencies:
      - package: mixpanel
        product: Mixpanel
      - package: AuthSDK
        product: AuthSDK
      - package: TrackingSDK
        product: TrackingSDK
    settings:
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      SKIP_INSTALL: NO
      ENABLE_USER_SCRIPT_SANDBOXING: YES
      INFOPLIST_FILE: Sources/PaymentSDK/Supporting Files/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.dar.paymentsdk

  PaymentSDKTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/PaymentSDKTests
    dependencies:
      - target: PaymentSDK
    settings:
      INFOPLIST_FILE: Sources/PaymentSDKTests/Supporting Files/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.dar.paymentsdk.tests
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      DEVELOPMENT_TEAM: ""
schemes:
  PaymentSDK-Dev:
    archive:
      config: Dev
    build:
      targets:
        PaymentSDK: all
        PaymentSDKTests: all
    test:
      targets:
        PaymentSDKTests:
          parallelizable: false
          randomExecutionOrder: false
    run:
      config: Dev

  PaymentSDK-Staging:
    archive:
      config: Staging
    build:
      targets:
        PaymentSDK: all
        PaymentSDKTests: all
    test:
      targets:
        PaymentSDKTests:
          parallelizable: false
          randomExecutionOrder: false
    run:
      config: Staging

  PaymentSDK-Production:
    archive:
      config: Production
    build:
      targets:
        PaymentSDK: all
        PaymentSDKTests: all
    test:
      targets:
        PaymentSDKTests:
          parallelizable: false
          randomExecutionOrder: false
    run:
      config: Production

packages:
  mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift.git
    exactVersion: 5.0.0
  AuthSDK:
    path: ../AuthSDK
  TrackingSDK:
    path: ../TrackingSDK
